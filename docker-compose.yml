services:
  # =========================
  # Caddy Reverse Proxy (HTTPS)
  # =========================
  caddy:
    image: caddy:2-alpine
    container_name: tasktify-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/data/logs
    depends_on:
      - gateway
    networks:
      - frontend

  # =========================
  # PostgreSQL Database
  # =========================
  postgres:
    image: postgres:18-alpine
    container_name: tasktify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-tasktify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # =========================
  # Auth Service (gRPC :3001)
  # =========================
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: tasktify-auth-service
    restart: unless-stopped
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-tasktify}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SSL_MODE: disable
      DB_POOL_IDLE: 10
      DB_MAX_POOL: 100
      DB_MAX_LIFETIME: 300
      APP_NAME: auth-service
      APP_MODE: production
      GRPC_PORT: 3001
      JWT_ALLOWED_ALGS: Falcon-Precomputed-512
      JWT_ISSUER: tasktify
      JWT_PRIVATE_KEY_PATH: /app/keys/falcon512_sk.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/falcon512_vk.pem
      JWT_TOKEN_DURATION: 60
    volumes:
      - ./auth-service/keys:/app/keys
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  # =========================
  # Todo Service (gRPC :3002)
  # =========================
  todo-service:
    build:
      context: .
      dockerfile: todo-service/Dockerfile
    container_name: tasktify-todo-service
    restart: unless-stopped
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-tasktify}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SSL_MODE: disable
      DB_POOL_IDLE: 10
      DB_MAX_POOL: 100
      DB_MAX_LIFETIME: 300
      APP_NAME: todo-service
      APP_MODE: production
      GRPC_PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  # =========================
  # API Gateway (HTTP :3000)
  # =========================
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: tasktify-gateway
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      APP_NAME: gateway
      APP_PREFORK: "false"
      APP_PORT: 3000
      APP_MODE: production
      AUTH_SERVICE_ADDR: auth-service:3001
      TODO_SERVICE_ADDR: todo-service:3002
      JWT_ALLOWED_ALGS: Falcon-Precomputed-512
      JWT_ISSUER: tasktify
      JWT_PUBLIC_KEY_PATH: /app/keys/falcon512_vk.pem
      JWT_TOKEN_DURATION: 60
    volumes:
      - ./gateway/keys:/app/keys
    depends_on:
      - auth-service
      - todo-service
    networks:
      - frontend
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  caddy_logs:
