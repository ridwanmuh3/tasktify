services:
  # =========================
  # Shared Infrastructure
  # =========================
  bench-postgres:
    image: postgres:18-alpine
    container_name: bench-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasktify_bench
    volumes:
      - bench_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bench-backend

  bench-todo:
    build:
      context: .
      dockerfile: todo-service/Dockerfile
    container_name: bench-todo
    restart: unless-stopped
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tasktify_bench
      DB_HOST: bench-postgres
      DB_PORT: 5432
      DB_SSL_MODE: disable
      DB_POOL_IDLE: 10
      DB_MAX_POOL: 100
      DB_MAX_LIFETIME: 300
      APP_NAME: bench-todo
      APP_MODE: production
      GRPC_PORT: 3002
    depends_on:
      bench-postgres:
        condition: service_healthy
    networks:
      - bench-backend

  # =========================
  # All benchmark algorithms in ONE auth + ONE gateway pair.
  # JWT_ALLOWED_ALGS lists every algorithm instead of one stack per algorithm;
  # multiAlgJwtUtil.Sign() (pkg/utils/jwtutils/jwt.go) already dispatches on
  # the per-request "algorithm" field, and the gateway's /api/benchmark/*
  # handler always loads every supported algorithm regardless of
  # JWT_ALLOWED_ALGS (gateway/internal/config/app.go) — so pure-signing,
  # isolated, and stress scenarios all work unmodified against one pair.
  # No other container competes for host CPU during a run — that removes the
  # two-stack noisy-neighbor problem (docs/p0-penjelasan.md P0-7) structurally
  # instead of by scheduling, so cross-algorithm comparison is clean.
  # PQC (FN-DSA) vs classical (HS256/RS256/ES256/EdDSA) all benchmarked here.
  # NOTE: mixing HS256 (symmetric) with asymmetric algs in one verify allow-list
  # is an algorithm-confusion risk in PRODUCTION (RFC 8725) — acceptable only
  # because this is an isolated benchmark stack with throwaway keys.
  # Gateway: :5001
  # =========================
  bench-auth:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: bench-auth
    restart: unless-stopped
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tasktify_bench
      DB_HOST: bench-postgres
      DB_PORT: 5432
      DB_SSL_MODE: disable
      DB_POOL_IDLE: 5
      DB_MAX_POOL: 50
      DB_MAX_LIFETIME: 300
      APP_NAME: bench-auth
      APP_MODE: production
      GRPC_PORT: 3001
      JWT_DEFAULT_ALG: FN-DSA-Precomputed-512
      JWT_ALLOWED_ALGS: FN-DSA-Precomputed-512,FN-DSA-512,HS256,RS256,ES256,EdDSA
      JWT_ISSUER: tasktify
      JWT_TOKEN_DURATION: 60
      KEYS_DIR: /app/keys
    volumes:
      - ./keys:/app/keys
    depends_on:
      bench-postgres:
        condition: service_healthy
    networks:
      - bench-backend

  bench-gw:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: bench-gw
    restart: unless-stopped
    environment:
      APP_NAME: bench-gw
      APP_PORT: 3000
      APP_MODE: production
      AUTH_SERVICE_ADDR: bench-auth:3001
      TODO_SERVICE_ADDR: bench-todo:3002
      JWT_DEFAULT_ALG: FN-DSA-Precomputed-512
      JWT_ALLOWED_ALGS: FN-DSA-Precomputed-512,FN-DSA-512,HS256,RS256,ES256,EdDSA
      JWT_ISSUER: tasktify
      JWT_TOKEN_DURATION: 60
      KEYS_DIR: /app/keys
    volumes:
      - ./keys:/app/keys
    ports:
      - "5001:3000"
    depends_on:
      - bench-auth
      - bench-todo
    networks:
      - bench-backend

  # =========================
  # Classical baselines (HS256/RS256/ES256/EdDSA) — disabled for now.
  # Running all 6 algorithms' containers (12 auth+gateway services) on a
  # shared 2-vCPU host causes noisy-neighbor CPU scheduling contention that
  # contaminates E2E/stress comparisons between algorithms (see
  # docs/p0-penjelasan.md P0-7). Trimmed to just the two FN-DSA variants the
  # thesis compares directly; restore from git history when classical
  # baselines are needed again.
  # =========================

networks:
  bench-backend:
    driver: bridge

volumes:
  bench_postgres_data:
